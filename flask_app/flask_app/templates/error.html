{% extends "base.html" %}
{% block title %}{{ code }} — ClassifyAI{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-code">{{ code }}</div>
  <h1 class="error-msg">{{ message }}</h1>
  <p class="error-sub">
    {% if code == 404 %}The page you're looking for doesn't exist.
    {% else %}Something went wrong on our end. Please try again.{% endif %}
  </p>
  <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
    <i class="fa-solid fa-house"></i> Back to Home
  </a>
</div>
{% endblock %}
